<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=, initial-scale=1.0" />
    <title>Calculator Website</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
    <script src="calculate.js"></script>
</head>

<body>
   <div class="title">
    <h3>Robert Basic Calculator(HTML, CSS & JavaScript)</h3>
   </div>

    <div class="Container">
        <div class="calculator">
            <form class="frmCharacters">
                <div class="display">
                    <input type="text" name="display" />
                </div>

                <div>
                    <input type="button" value="C" onclick="display.value = ''" class="operator" />
                    <input class="operator" type="button" value="DE"
                        onclick="display.value = display.value.toString().slice(0, -1)" />
                    <input class="operator" type="button" value="." onclick="display.value += '.'" />
                    <input class="operator" type="button" value="/" onclick="display.value += '/'" />
                </div>
                <div>
                    <input type="button" value="7" onclick="appendValue('7')" />
                    <input type="button" value="8" onclick="appendValue('8')" />
                    <input type="button" value="9" onclick="appendValue('9')" />
                    <input class="operator" type="button" value="*" onclick="display.value += '*'" />
                </div>
                <div>
                    <input type="button" value="4" onclick="appendValue('4')" />
                    <input type="button" value="5" onclick="appendValue('5')" />
                    <input type="button" value="6" onclick="appendValue('6')" />
                    <input class="operator" type="button" value="-" onclick="display.value += '-'" />
                </div>
                <div>
                    <input type="button" value="1" onclick="appendValue('1')" />
                    <input type="button" value="2" onclick="appendValue('2')" />
                    <input type="button" value="3" onclick="appendValue('3')" />
                    <input class="operator" type="button" value="+" onclick="display.value += '+'" />
                </div>
                <div>
                    <input type="button" value="0" onclick="appendValue('0')" />
                    <input class="equalOperator" type="button" value="=" onclick="calculate()" />
                </div>
            </form>
        </div>
    </div>
</body>

</html>
